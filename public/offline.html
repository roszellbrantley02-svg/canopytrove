<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Canopy Trove</title>
    <meta name="theme-color" content="#121614" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0a100d 0%, #121614 50%, #151d19 100%);
        color: #FFFBF7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .container {
        max-width: 360px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: rgba(0, 245, 140, 0.08);
        border: 1.5px solid rgba(143, 255, 209, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .icon svg {
        width: 36px;
        height: 36px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.3px;
      }
      p {
        font-size: 15px;
        line-height: 1.5;
        color: #C4B8B0;
        margin-bottom: 32px;
      }
      .retry-btn {
        display: inline-block;
        padding: 14px 32px;
        background: #2ECC71;
        color: #121614;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        text-decoration: none;
        min-height: 48px;
        transition: opacity 0.2s;
      }
      .retry-btn:hover {
        opacity: 0.85;
      }
      .retry-btn:active {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#2ECC71"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Check your internet connection and try again. Your saved dispensaries will be waiting.</p>
      <button class="retry-btn" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
