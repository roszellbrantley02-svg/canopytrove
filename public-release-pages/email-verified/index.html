<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Verified | Canopy Trove&#8482;</title>
    <meta
      name="description"
      content="Your Canopy Trove email address is verified. Open the app to keep going."
    />
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://canopytrove.com/email-verified/" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .verified-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
        background: #121614;
      }
      .verified-card {
        max-width: 520px;
        width: 100%;
        background: #1d2421;
        border-radius: 16px;
        padding: 40px 32px;
        border: 1px solid rgba(196, 184, 176, 0.18);
        text-align: center;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      .verified-eyebrow {
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #2ecc71;
        font-weight: 600;
        margin: 0 0 12px 0;
      }
      .verified-card h1 {
        margin: 0 0 16px 0;
        font-size: 28px;
        line-height: 1.2;
        color: #fffbf7;
        font-weight: 700;
      }
      .verified-card p {
        margin: 0 0 16px 0;
        font-size: 16px;
        line-height: 1.55;
        color: #c4b8b0;
      }
      .verified-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 28px;
      }
      .verified-button {
        display: inline-block;
        padding: 14px 24px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        background: #2ecc71;
        color: #121614;
      }
      .verified-link {
        display: inline-block;
        padding: 12px 16px;
        font-size: 14px;
        text-decoration: underline;
        color: #c4b8b0;
      }
      .verified-icon {
        font-size: 64px;
        line-height: 1;
        margin: 0 0 8px 0;
      }
    </style>
  </head>
  <body>
    <div class="verified-shell">
      <div class="verified-card">
        <p class="verified-icon">&#10003;</p>
        <p class="verified-eyebrow">Canopy Trove</p>
        <h1>Your email is verified.</h1>
        <p>
          Thanks for confirming. Your Canopy Trove account is now fully set up &mdash; you can
          close this tab and return to the app where you signed up.
        </p>
        <div class="verified-actions">
          <a class="verified-button" href="https://app.canopytrove.com/">Open the web app</a>
          <a class="verified-link" href="https://canopytrove.com/">Back to canopytrove.com</a>
        </div>
      </div>
    </div>
  </body>
</html>
