<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Primary Meta Tags -->
    <title>Canopy Trove — Find Live Dispensaries Near You</title>
    <meta name="title" content="Canopy Trove — Find Live Dispensaries Near You" />
    <meta name="description" content="Find licensed dispensaries open now near you. Live hours, directions, hot deals, real reviews, and verified storefronts. Browse New York dispensaries instantly — no app download required." />
    <meta name="keywords" content="dispensary near me, dispensaries open now, licensed dispensary, cannabis dispensary, weed dispensary, New York dispensary, dispensary deals, dispensary reviews, dispensary hours, find dispensary" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://app.canopytrove.com/" />
    <meta name="theme-color" content="#121614" />

    <!-- Preconnect to critical origins for faster first requests -->
    <link rel="preconnect" href="https://api.canopytrove.com" crossorigin />
    <link rel="preconnect" href="https://firebaseinstallations.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.canopytrove.com" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Canopy Trove" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.canopytrove.com/" />
    <meta property="og:title" content="Canopy Trove — Find Live Dispensaries Near You" />
    <meta property="og:description" content="Find licensed dispensaries open now near you. Live hours, directions, deals, and real reviews. Browse New York dispensaries instantly." />
    <meta property="og:image" content="https://app.canopytrove.com/og-image.png" />
    <meta property="og:site_name" content="Canopy Trove" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://app.canopytrove.com/" />
    <meta property="twitter:title" content="Canopy Trove — Find Live Dispensaries Near You" />
    <meta property="twitter:description" content="Find licensed dispensaries open now near you. Live hours, directions, deals, and real reviews. Browse New York dispensaries instantly." />
    <meta property="twitter:image" content="https://app.canopytrove.com/og-image.png" />

    <!-- Structured Data — WebApplication + Organization + FAQ -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Canopy Trove",
        "url": "https://app.canopytrove.com",
        "description": "Find licensed dispensaries open now near you. Live hours, directions, hot deals, real reviews, and verified storefronts in New York.",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Organization",
          "name": "Canopy Trove LLC",
          "url": "https://canopytrove.com"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://app.canopytrove.com/browse?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Canopy Trove LLC",
        "url": "https://canopytrove.com",
        "logo": "https://app.canopytrove.com/icon-512.png",
        "description": "Licensed dispensary discovery platform helping consumers find verified, legal cannabis retailers in New York.",
        "sameAs": []
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How do I find licensed dispensaries near me?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Open Canopy Trove and allow location access. The app shows licensed dispensaries near you with live hours, directions, deals, and real reviews. All listings are verified against the New York Office of Cannabis Management registry."
            }
          },
          {
            "@type": "Question",
            "name": "Are all dispensaries on Canopy Trove licensed?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Canopy Trove sources its listings from the New York Office of Cannabis Management (OCM) public registry. Each storefront is cross-referenced to ensure it holds a valid license."
            }
          },
          {
            "@type": "Question",
            "name": "Is Canopy Trove free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Canopy Trove is completely free for consumers. Browse dispensaries, read reviews, find deals, and get directions at no cost."
            }
          }
        ]
      }
    ]
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Referrer policy fallback for browsers that don't read the header -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Expo recommended reset -->
    <style id="expo-reset">
      html, body { height: 100%; margin: 0; padding: 0; }
      body { overflow: hidden; background-color: #121614; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>

    <!-- Font-display swap fallbacks — prevent invisible text (FOIT) during bundle load.
         Expo bundles fonts in JS; these @font-face rules ensure text renders immediately
         with system fallbacks and swaps to the real fonts once the bundle runs. -->
    <style id="ct-font-fallbacks">
      @font-face { font-family: 'SpaceGrotesk_700Bold'; font-display: swap; src: local('Space Grotesk Bold'), local('SpaceGrotesk-Bold'); }
      @font-face { font-family: 'SpaceGrotesk_500Medium'; font-display: swap; src: local('Space Grotesk Medium'), local('SpaceGrotesk-Medium'); }
      @font-face { font-family: 'DMSans_400Regular'; font-display: swap; src: local('DM Sans'), local('DMSans-Regular'); }
      @font-face { font-family: 'DMSans_500Medium'; font-display: swap; src: local('DM Sans Medium'), local('DMSans-Medium'); }
      @font-face { font-family: 'DMSans_700Bold'; font-display: swap; src: local('DM Sans Bold'), local('DMSans-Bold'); }
    </style>

    <!-- CSS shimmer animation — replaces JS-driven Animated.timing on web (INP fix) -->
    <style id="ct-shimmer-css">
      @keyframes ct-shimmer-sweep {
        0% { transform: translateX(-132px) rotate(16deg); }
        100% { transform: translateX(240px) rotate(16deg); }
      }
      .ct-shimmer-sweep {
        animation: ct-shimmer-sweep 1.4s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .ct-shimmer-sweep { animation: none; opacity: 0.5; }
      }
    </style>

    <!-- Loading screen styles -->
    <style id="splash-screen">
      #ct-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a100d 0%, #121614 50%, #151d19 100%);
        transition: opacity 0.4s ease-out;
      }
      #ct-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #ct-splash-logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: rgba(0, 245, 140, 0.08);
        border: 1.5px solid rgba(143, 255, 209, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        animation: ct-pulse 2s ease-in-out infinite;
      }
      #ct-splash-logo svg {
        width: 36px;
        height: 36px;
      }
      #ct-splash-name {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: rgba(255, 251, 247, 0.5);
        margin-bottom: 32px;
      }
      #ct-splash-bar-track {
        width: 120px;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      #ct-splash-bar-fill {
        width: 0%;
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #2ECC71, #E8A000);
        animation: ct-load 3s ease-out forwards;
      }
      @keyframes ct-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.04); opacity: 0.85; }
      }
      @keyframes ct-load {
        0% { width: 0%; }
        30% { width: 40%; }
        60% { width: 70%; }
        90% { width: 85%; }
        100% { width: 95%; }
      }
    </style>
  </head>

  <body>
    <!-- Splash screen shown while JS bundle loads -->
    <div id="ct-splash">
      <div id="ct-splash-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#2ECC71"/>
        </svg>
      </div>
      <div id="ct-splash-name">Canopy Trove</div>
      <div id="ct-splash-bar-track">
        <div id="ct-splash-bar-fill"></div>
      </div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="/scripts/standalone-nav.js"></script>

    <script src="/scripts/splash-observer.js"></script>

    <!-- Service Worker registration -->
    <script src="/scripts/sw-register.js"></script>

    <!-- Web Vitals — field measurement of LCP, INP, CLS (~2KB async) -->
    <script src="/scripts/web-vitals-reporter.js"></script>
  </body>
</html>
