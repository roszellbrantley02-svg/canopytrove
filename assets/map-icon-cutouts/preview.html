<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
body { margin:0; background:#0b1116; color:#ecf5f2; font-family:Segoe UI, sans-serif; }
.wrap { padding:32px; }
.grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:22px; }
.item { display:flex; flex-direction:column; align-items:center; gap:10px; }
.pin { width:94px; height:94px; border-radius:28px 28px 28px 10px; transform:rotate(45deg); background:linear-gradient(180deg,#ffffff,#d8e7df); box-shadow:0 16px 28px rgba(0,0,0,.35), inset 0 2px 0 rgba(255,255,255,.9), inset 0 -6px 10px rgba(61,99,69,.12); border:1px solid rgba(61,99,69,.18); display:flex; align-items:center; justify-content:center; }
.pin img { width:54px; height:54px; transform:rotate(-45deg); filter:drop-shadow(0 2px 1px rgba(0,0,0,.08)); }
.pin-digit img { width:46px; height:46px; }
.label { text-transform:capitalize; font-size:12px; letter-spacing:.4px; color:#9cb2ab; }
</style>
</head>
<body>
<div class="wrap"><div class="grid"><div class="item"><div class="pin"><img src="browse.svg" alt="browse"></div><div class="label">browse</div></div><div class="item"><div class="pin"><img src="deals.svg" alt="deals"></div><div class="label">deals</div></div><div class="item"><div class="pin"><img src="map.svg" alt="map"></div><div class="label">map</div></div><div class="item"><div class="pin"><img src="travel.svg" alt="travel"></div><div class="label">travel</div></div><div class="item"><div class="pin"><img src="saved.svg" alt="saved"></div><div class="label">saved</div></div><div class="item"><div class="pin"><img src="favorites.svg" alt="favorites"></div><div class="label">favorites</div></div><div class="item"><div class="pin"><img src="reviews.svg" alt="reviews"></div><div class="label">reviews</div></div><div class="item"><div class="pin"><img src="leaderboard.svg" alt="leaderboard"></div><div class="label">leaderboard</div></div><div class="item"><div class="pin"><img src="stars.svg" alt="stars"></div><div class="label">stars</div></div><div class="item"><div class="pin"><img src="badges.svg" alt="badges"></div><div class="label">badges</div></div><div class="item"><div class="pin"><img src="profile.svg" alt="profile"></div><div class="label">profile</div></div><div class="item"><div class="pin"><img src="search.svg" alt="search"></div><div class="label">search</div></div><div class="item"><div class="pin"><img src="settings.svg" alt="settings"></div><div class="label">settings</div></div><div class="item"><div class="pin"><img src="nearby.svg" alt="nearby"></div><div class="label">nearby</div></div><div class="item"><div class="pin"><img src="back.svg" alt="back"></div><div class="label">back</div></div><div class="item"><div class="pin"><img src="close.svg" alt="close"></div><div class="label">close</div></div><div class="item"><div class="pin pin-digit"><img src="digits/0.svg" alt="0"></div><div class="label">0</div></div><div class="item"><div class="pin pin-digit"><img src="digits/1.svg" alt="1"></div><div class="label">1</div></div><div class="item"><div class="pin pin-digit"><img src="digits/2.svg" alt="2"></div><div class="label">2</div></div><div class="item"><div class="pin pin-digit"><img src="digits/3.svg" alt="3"></div><div class="label">3</div></div><div class="item"><div class="pin pin-digit"><img src="digits/4.svg" alt="4"></div><div class="label">4</div></div><div class="item"><div class="pin pin-digit"><img src="digits/5.svg" alt="5"></div><div class="label">5</div></div><div class="item"><div class="pin pin-digit"><img src="digits/6.svg" alt="6"></div><div class="label">6</div></div><div class="item"><div class="pin pin-digit"><img src="digits/7.svg" alt="7"></div><div class="label">7</div></div><div class="item"><div class="pin pin-digit"><img src="digits/8.svg" alt="8"></div><div class="label">8</div></div><div class="item"><div class="pin pin-digit"><img src="digits/9.svg" alt="9"></div><div class="label">9</div></div></div></div>

</html>
