name: Refresh OCM Verified Seed

on:
  # Runs every Monday at 11:00 UTC (07:00 EST / 06:00 EDT). The job checks the
  # seed file's last commit timestamp and only regenerates if it is older than
  # ~3 weeks, so the effective cadence is "auto-refresh every 3 weeks" while
  # being resilient to missed runs and respecting any manual refreshes between.
  schedule:
    - cron: '0 11 * * 1'
  # Allows a maintainer to trigger a refresh on demand from the Actions tab.
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip the staleness check and regenerate now'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_deploy:
        description: 'Skip backend deploy + sweep even if AUTO_DEPLOY is enabled (use during Apple review windows)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  id-token: write

env:
  GCP_PROJECT_ID: canopy-trove
  GCP_REGION: us-east4
  CLOUD_RUN_SERVICE: canopytrove-api
  ARTIFACT_REGISTRY_IMAGE: us-east4-docker.pkg.dev/canopy-trove/canopytrove-api/canopytrove-api
  BACKEND_BASE_URL: https://api.canopytrove.com

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
      record_count: ${{ steps.diff.outputs.record_count }}
      seed_sha: ${{ steps.commit.outputs.seed_sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check seed file staleness
        id: staleness
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          SEED_FILE=src/data/ocmVerifiedStorefrontRecords.generated.ts
          if [ ! -f "$SEED_FILE" ]; then
            echo "Seed file not found at $SEED_FILE — running regeneration."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${FORCE_REFRESH:-false}" = "true" ]; then
            echo "Force flag set — running regeneration regardless of age."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_COMMIT_TS=$(git log -1 --pretty=%at -- "$SEED_FILE" || echo 0)
          NOW_TS=$(date +%s)
          if [ "$LAST_COMMIT_TS" = "0" ]; then
            AGE_DAYS=999
          else
            AGE_DAYS=$(( (NOW_TS - LAST_COMMIT_TS) / 86400 ))
          fi

          echo "Seed file age: $AGE_DAYS days (threshold: 20)"
          echo "age_days=$AGE_DAYS" >> "$GITHUB_OUTPUT"
          if [ "$AGE_DAYS" -lt 20 ]; then
            echo "Skipping refresh — seed is fresh enough."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Refreshing — seed is stale."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 22
        if: steps.staleness.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.staleness.outputs.should_run == 'true'
        run: npm ci --no-audit --no-fund

      - name: Regenerate OCM verified seed
        if: steps.staleness.outputs.should_run == 'true'
        run: npm run generate:ocm-verified-seed

      - name: Verify TypeScript compiles with new seed
        if: steps.staleness.outputs.should_run == 'true'
        run: npm run typecheck

      - name: Detect changes
        if: steps.staleness.outputs.should_run == 'true'
        id: diff
        run: |
          set -euo pipefail
          SEED_FILE=src/data/ocmVerifiedStorefrontRecords.generated.ts
          if git diff --quiet "$SEED_FILE"; then
            echo "No changes detected — OCM has not added any storefronts."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(grep -c '^    "id":' "$SEED_FILE" || echo unknown)
            echo "Changes detected — new record count: $COUNT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "record_count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push refresh
        if: steps.staleness.outputs.should_run == 'true' && steps.diff.outputs.has_changes == 'true'
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/ocmVerifiedStorefrontRecords.generated.ts
          DATE=$(date +%Y-%m-%d)
          COUNT="${{ steps.diff.outputs.record_count }}"
          git commit \
            -m "data(ocm): scheduled seed refresh ($DATE, $COUNT records)" \
            -m "Auto-generated by .github/workflows/refresh-ocm-seed.yml"
          git push origin master
          NEW_SHA=$(git rev-parse --short HEAD)
          echo "Committed seed refresh as $NEW_SHA"
          echo "seed_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"

      - name: Refresh summary
        if: always()
        run: |
          {
            echo "## OCM Seed Refresh Summary"
            echo
            echo "- should_run: ${{ steps.staleness.outputs.should_run }}"
            echo "- age_days: ${{ steps.staleness.outputs.age_days }}"
            echo "- has_changes: ${{ steps.diff.outputs.has_changes }}"
            echo "- record_count: ${{ steps.diff.outputs.record_count }}"
            echo "- seed_sha: ${{ steps.commit.outputs.seed_sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_and_enrich:
    needs: refresh
    if: |
      needs.refresh.outputs.has_changes == 'true' &&
      vars.AUTO_DEPLOY == 'true' &&
      github.event.inputs.skip_deploy != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo at refreshed seed
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Compute deploy tag
        id: tag
        run: |
          TAG=$(git rev-parse --short HEAD)
          echo "Deploy tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image to Artifact Registry
        run: |
          set -euo pipefail
          gcloud builds submit \
            --tag "${{ env.ARTIFACT_REGISTRY_IMAGE }}:${{ steps.tag.outputs.tag }}" \
            --project "${{ env.GCP_PROJECT_ID }}"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "${{ env.ARTIFACT_REGISTRY_IMAGE }}:${{ steps.tag.outputs.tag }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}"

      - name: Wait for /readyz to return 200
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.BACKEND_BASE_URL }}/readyz" || echo "000")
            echo "Attempt $attempt: /readyz returned $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready."
              exit 0
            fi
            sleep 4
          done
          echo "Backend did not become ready within 120 seconds."
          exit 1

      - name: Trigger discovery enrichment sweep
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_API_KEY}" ]; then
            echo "ADMIN_API_KEY secret is not set — cannot trigger sweep."
            exit 1
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-admin-api-key: ${ADMIN_API_KEY}" \
            -H "Content-Type: application/json" \
            "${{ env.BACKEND_BASE_URL }}/admin/discovery/sweep")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Sweep response status: $STATUS"
          echo "Sweep response body: $BODY"

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ]; then
            echo "Sweep request failed with status $STATUS."
            exit 1
          fi

          echo "Sweep accepted. Background enrichment is now running."

      - name: Deploy + sweep summary
        if: always()
        run: |
          {
            echo "## Deploy + Enrichment Summary"
            echo
            echo "- deploy_tag: ${{ steps.tag.outputs.tag }}"
            echo "- cloud_run_service: ${{ env.CLOUD_RUN_SERVICE }}"
            echo "- backend_base_url: ${{ env.BACKEND_BASE_URL }}"
            echo
            echo "**The new storefronts should now be visible in the app within minutes.**"
          } >> "$GITHUB_STEP_SUMMARY"

  notify_skipped:
    needs: refresh
    if: |
      needs.refresh.outputs.has_changes == 'true' &&
      (vars.AUTO_DEPLOY != 'true' || github.event.inputs.skip_deploy == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Notify that deploy was skipped
        run: |
          {
            echo "## Auto-deploy skipped"
            echo
            if [ "${{ vars.AUTO_DEPLOY }}" != "true" ]; then
              echo "AUTO_DEPLOY repo variable is not set to 'true' (currently: '${{ vars.AUTO_DEPLOY }}')."
            fi
            if [ "${{ github.event.inputs.skip_deploy }}" = "true" ]; then
              echo "Manual workflow_dispatch passed skip_deploy=true."
            fi
            echo
            echo "The seed has been refreshed and committed to master, but new storefronts will NOT appear in the app until the backend is redeployed manually:"
            echo
            echo '```powershell'
            echo 'cd D:\\src\\canopytrove'
            echo 'git pull'
            echo '$tag = git rev-parse --short HEAD'
            echo 'gcloud builds submit --tag "us-east4-docker.pkg.dev/canopy-trove/canopytrove-api/canopytrove-api:$tag" --project canopy-trove'
            echo 'gcloud run deploy canopytrove-api --image "us-east4-docker.pkg.dev/canopy-trove/canopytrove-api/canopytrove-api:$tag" --region us-east4 --project canopy-trove'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
